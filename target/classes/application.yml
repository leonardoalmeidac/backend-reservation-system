server:
  port: 8080

spring:
  application:
    name: gallery-reservation-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/gallery_reservation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

